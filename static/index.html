<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'" />
  <title>AI Chat</title>
  <link rel="preconnect" href="/static/vendor/" />
  <link rel="stylesheet" href="/static/vendor/highlight-theme.css" />
  <link rel="stylesheet" href="/static/vendor/katex/katex.min.css" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div id="app" class="app">
    <!-- ============================ SIDEBAR ============================ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__head">
        <div class="brand">
          <span class="brand__mark">✦</span>
          <span class="brand__name">AI&nbsp;Chat</span>
        </div>
        <button class="icon-btn sidebar__collapse" id="collapseBtn" title="사이드바 접기" aria-label="사이드바 접기">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <button class="new-chat" id="newChatBtn">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>새 대화</span>
      </button>

      <div class="conv-list" id="convList"></div>

      <div class="sidebar__foot">
        <button class="foot-btn" id="themeToggle" title="테마 전환">
          <svg class="ico-moon" viewBox="0 0 24 24" width="18" height="18"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <svg class="ico-sun" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span class="foot-btn__label">테마</span>
        </button>
      </div>
    </aside>

    <div class="sidebar-scrim" id="scrim"></div>

    <!-- ============================= MAIN ============================= -->
    <main class="main">
      <header class="topbar">
        <button class="icon-btn" id="menuBtn" title="메뉴" aria-label="메뉴">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="topbar__title" id="topbarTitle">새 대화</div>
        <div class="model-select">
          <select id="modelSelect" aria-label="모델 선택"></select>
          <svg class="model-select__chev" viewBox="0 0 24 24" width="16" height="16"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </header>

      <div class="chat-scroll" id="chatScroll">
        <div class="chat" id="chat"></div>

        <!-- 빈 상태 / 환영 화면 -->
        <div class="welcome" id="welcome">
          <div class="welcome__logo">✦</div>
          <h1 class="welcome__title">무엇을 도와드릴까요?</h1>
          <p class="welcome__sub">자연어로 질문하거나 이미지를 첨부해 보세요.</p>
          <div class="examples" id="examples">
            <button class="example" data-prompt="양자 컴퓨팅을 초등학생도 이해하게 설명해줘">
              <span class="example__emoji">🧠</span><span>양자 컴퓨팅을 쉽게 설명</span>
            </button>
            <button class="example" data-prompt="파이썬으로 이진 탐색을 구현하고 설명해줘">
              <span class="example__emoji">💻</span><span>이진 탐색 코드 작성</span>
            </button>
            <button class="example" data-prompt="이번 주말 서울 근교 당일치기 여행 계획을 표로 짜줘">
              <span class="example__emoji">🗺️</span><span>여행 계획 표로 만들기</span>
            </button>
            <button class="example" data-prompt="사진을 올리면 무엇이 보이는지 분석해줘. 먼저 방법을 알려줘.">
              <span class="example__emoji">🖼️</span><span>이미지 분석하는 법</span>
            </button>
          </div>
        </div>
      </div>

      <button class="scroll-bottom" id="scrollBottom" title="맨 아래로" aria-label="맨 아래로">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 5v14M6 13l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <!-- =========================== COMPOSER =========================== -->
      <div class="composer-wrap">
        <div class="attachments" id="attachments"></div>
        <form class="composer" id="composer">
          <button type="button" class="icon-btn composer__attach" id="attachBtn" title="이미지 첨부" aria-label="이미지 첨부">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M21 12.5l-8.5 8.5a5.5 5.5 0 01-7.8-7.8l8.5-8.5a3.5 3.5 0 014.95 4.95L9.6 18.2a1.5 1.5 0 01-2.12-2.12l7.6-7.6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <textarea id="input" class="composer__input" rows="1" placeholder="메시지를 입력하세요…" autofocus></textarea>
          <button type="submit" class="send-btn" id="sendBtn" title="전송" aria-label="전송">
            <svg class="ico-send" viewBox="0 0 24 24" width="20" height="20"><path d="M4 12l16-8-6 8 6 8-16-8z" fill="currentColor"/></svg>
            <svg class="ico-stop" viewBox="0 0 24 24" width="20" height="20"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
          </button>
          <input type="file" id="fileInput" accept="image/*" multiple hidden />
        </form>
        <div class="composer__hint">Enter 전송 · Shift+Enter 줄바꿈 · 이미지 붙여넣기/드래그 가능</div>
      </div>

      <div class="drop-overlay" id="dropOverlay">
        <div class="drop-overlay__box">
          <svg viewBox="0 0 24 24" width="48" height="48"><path d="M12 16V4M6 10l6-6 6 6M4 20h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <p>이미지를 여기에 놓으세요</p>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-host" id="toastHost"></div>

  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/vendor/dompurify.min.js"></script>
  <script src="/static/vendor/highlight.min.js"></script>
  <script src="/static/vendor/katex/katex.min.js"></script>
  <script src="/static/vendor/katex/auto-render.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
